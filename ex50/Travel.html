<html>
<head>
    <meta charset="UTF-8">
    <title>Exercise 50: Travel Expense Report</title>
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }

        .form-container {
            background-color: #cbf7ff; 
            border: 2px solid #3366cc;
            padding: 20px;
            max-width: 750px;
            margin: 0 auto;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-area img {
            max-width: 100%;
            height: auto;
            border: 1px solid #000;
        }

        h2 {
            color: #000;
            margin-bottom: 5px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.6;
        }

        input[type="text"], input[type="date"], select, textarea {
            padding: 3px;
            border: 1px solid #7f7f7f;
            font-family: Arial, sans-serif;
        }

        textarea {
            width: 80%;
            height: 60px;
            margin-top: 5px;
            resize: none;
        }

        .expense-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
            margin-bottom: 15px;
            background-color: #cbf7ff;
        }

        .expense-table th {
            background-color: #bbf2fc;
            border: 1px solid #7cbcd6;
            padding: 5px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }

        .expense-table td {
            border: 1px solid #7cbcd6;
            padding: 4px;
            text-align: center;
        }

        .expense-table input, .expense-table select {
            width: 95%;
            box-sizing: border-box;
        }

        .button-group {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .button-group button {
            padding: 4px 10px;
            margin-right: 10px;
            cursor: pointer;
            background-color: #e1e1e1;
            border: 1px solid #767676;
            border-radius: 2px;
        }

        .button-group button:hover {
            background-color: #d0d0d0;
        }

    </style>
</head>
<body>
    <div class="form-container">
        <div class="logo-area">
            <img src="images/DeLong.jpg">
        </div>

        <h2>Travel Expense Report</h2>
        <hr>

        <form id="travelForm" onsubmit="alert('Đã gửi báo cáo chi phí chuyến đi thành công!'); return false;">
            <div class="form-group">
                1) First Name: <input type="text" name="firstName" style="width: 150px;">
                Last Name: <input type="text" name="lastName" style="width: 150px;">
            </div>

            <div class="form-group">
                2) Social Security Number: <input type="text" name="ssn" style="width: 100px;">
            </div>

            <div class="form-group">
                3) Department: 
                <select name="department">
                    <option value="Accounting">Accounting</option>
                    <option value="Sales">Sales</option>
                    <option value="Human Resources">Human Resources</option>
                    <option value="Marketing">Marketing</option>
                </select>
            </div>

            <div class="form-group">
                4) Describe the purpose of your trip.<br>
                <textarea name="purpose"></textarea>
            </div>

            <div class="form-group">
                5) Itemize your travel expenses
                <table class="expense-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">Date</th>
                            <th style="width: 45%;">Description</th>
                            <th style="width: 20%;">Category</th>
                            <th style="width: 15%;">Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><input type="text" name="date1" placeholder="mm/dd/yy"></td>
                            <td><input type="text" name="desc1"></td>
                            <td>
                                <select name="cat1">
                                    <option value="Meal">Meal</option>
                                    <option value="Lodging">Lodging</option>
                                    <option value="Transport">Transport</option>
                                </select>
                            </td>
                            <td><input type="text" name="amount1"></td>
                        </tr>
                        <tr>
                            <td><input type="text" name="date2" placeholder="mm/dd/yy"></td>
                            <td><input type="text" name="desc2"></td>
                            <td>
                                <select name="cat2">
                                    <option value="Meal">Meal</option>
                                    <option value="Lodging">Lodging</option>
                                    <option value="Transport">Transport</option>
                                </select>
                            </td>
                            <td><input type="text" name="amount2"></td>
                        </tr>
                        <tr>
                            <td><input type="text" name="date3" placeholder="mm/dd/yy"></td>
                            <td><input type="text" name="desc3"></td>
                            <td>
                                <select name="cat3">
                                    <option value="Meal">Meal</option>
                                    <option value="Lodging">Lodging</option>
                                    <option value="Transport">Transport</option>
                                </select>
                            </td>
                            <td><input type="text" name="amount3"></td>
                        </tr>
                        <tr>
                            <td><input type="text" name="date4" placeholder="mm/dd/yy"></td>
                            <td><input type="text" name="desc4"></td>
                            <td>
                                <select name="cat4">
                                    <option value="Meal">Meal</option>
                                    <option value="Lodging">Lodging</option>
                                    <option value="Transport">Transport</option>
                                </select>
                            </td>
                            <td><input type="text" name="amount4"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="form-group">
                6) Have you submitted your receipts? 
                <input type="radio" id="receiptYes" name="receipts" value="Yes"> <label id="receiptYes">Yes</label>
                <input type="radio" id="receiptNo" name="receipts" value="No"> <label id="receiptNo">No</label>
            </div>

            <div class="button-group">
                <button type="submit">Submit travel expenses</button>
                <button type="reset">Reset</button>
            </div>

            <div class="form-group"> 
                Questions? Contact Debbie Larson in Accounting (ext. 2150).
            </div>
        </form>
    </div>
</body>
</html>

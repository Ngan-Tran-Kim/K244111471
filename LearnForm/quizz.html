<html>
<head>
    <meta charset='utf-8'>
    <title>Tiêu đề trang</title>
</head>
<body>
    <fieldset>
        <legend>Quiz Form</legend>
        <form action="process_quizz.html" method="post">
            <table>
                <tr>
                    <td>Question 1: What is the capital of France?</td>
                </tr>
                <tr>
                    <td>
                        <input type="radio" id="q1a" name="q1" value="a">
                        <label for="q1a">A. Berlin</label><br>
                        <input type="radio" id="q1b" name="q1" value="b">
                        <label for="q1b">B. Madrid</label><br>
                        <input type="radio" id="q1c" name="q1" value="c">
                        <label for="q1c">C. Paris</label><br>
                        <input type="radio" id="q1d" name="q1" value="d">
                        <label for="q1d">D. Rome</label><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <button type="submit">Submit</button>
                    </td>
                </tr>
            </table>
        </form>
    </fieldset>

</body>
</html>

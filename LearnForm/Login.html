<html>
<head>
    <meta charset='utf-8'>
    <title>Tiêu đề trang</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
        }
        .login-box {
            width: 500px;
            padding: 25px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <form    
            action="process_login.html"
            method="get"
            name="loginForm">
            <table border="0" width="400" cellspacing="0" cellpadding="10" align="center">
                <tr>
                    <td rowspan="7">
                        <img src="images/ic_admin.png"
                            alt="Admin image"
                            width="150" height="250">
                    </td>
                </tr>
                <tr>
                    <td style="text-align: center; font-size: 24px; font-weight: bold;">
                        Login System
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="username">
                            Username:
                        </label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="text" name="username" id="username" value="obama" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="password">
                            Password:
                        </label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="password" name="password" id="password" value="123456" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="checkbox" name="remember" id="remember" value="remember">
                        <label for="remember">
                            Remember me
                        </label>
                    </td>
                </tr>
                <tr>
                    <td colspan="1" style="text-align: center;">
                        <input type="submit" value="Login" style="background-image: url(images/ic_login.png)">
                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>

<html>
<head>
    <meta charset='utf-8'>
    <title>Login Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
            background: #f4f4f4;
        }
        .result-box {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .result-box h1 {
            margin-top: 0;
        }
        .result-box p {
            font-size: 18px;
            line-height: 1.6;
        }
        .result-box .value {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="result-box">
        <h1>Kết quả đăng nhập</h1>
        <p>Username: <span id="username" class="value"></span></p>
        <p>Password: <span id="password" class="value"></span></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('username') || '';
        const password = params.get('password') || '';

        document.getElementById('username').textContent = username;
        document.getElementById('password').textContent = password;
    </script>
</body>
</html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Contact the editorial office</title>
    <style type="text/css">
        body {
            margin: 30px;
            color: #333;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #111;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .row-twin {
            display: flex;
            gap: 40px;
        }

        .row-twin .col {
            flex: 1;
        }

        input[type="text"], input[type="email"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
        }

        input[type="text"]:focus, input[type="email"]:focus, select:focus, textarea:focus {
            border-color: #aaa;
            outline: none;
        }

        textarea {
            height: 200px;
            resize: vertical;
        }

        button[type="submit"] {
            background-color: #991b4b; 
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #80133e;
        }
    </style>
</head>
<body>
    <h2>Contact the editorial office</h2>
    <form action="result.html" method="get">
        <div class="form-group">
            <label for="fullname">Full name</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>

        <div class="form-group row-twin">
            <div class="col">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="col">
                <label for="sendto">Send to</label>
                <select id="sendto" name="sendto">
                    <option value="Editorial board">Editorial board</option>
                    <option value="News Department">News Department</option>
                    <option value="Board of Perspectives">Board of Perspectives</option>
                    <option value="World Board">World Board</option>
                    <option value="Business Department">Business Department</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" name="content" required></textarea>
        </div>
        <button type="submit">Send</button>
    </form>
</body>
</html>

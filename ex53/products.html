<html>
<head>
    <meta charset="UTF-8">
    <title>List of Products</title>
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #111;
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .product-table th {
            font-size: 16px;
            font-weight: bold;
            padding: 10px 5px;
            text-align: center;
        }

        .product-table td {
            padding: 8px 5px;
            text-align: center;
            font-size: 15px;
        }

        input[type="text"], input[type="number"] {
            width: 85%;
            padding: 6px;
            border: 1px solid #b5b5b5;
            box-sizing: border-box;
        }

        .output-box {
            background-color: #f9f9f9;
        }

        .separator {
            border: 0;
            border-top: 2px solid #ccc;
            margin-bottom: 20px;
        }

        .total-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .total-container input {
            width: 250px;
            padding: 6px;
            border: 1px solid #4a90e2; 
        }

        .button-container {
            display: flex;
            justify-content: flex-end;
        }

        .btn-sum {
            background-color: #fab005;
            color: white;
            border: 1px solid #e09b00;
            padding: 8px 45px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-sum:hover {
            background-color: #e09b00;
        }
    </style>
</head>
<body>
    <form action="invoice.html" method="get">
        <table class="product-table">
            <thead>
                <tr>
                    <th style="width: 15%;">Part Number</th>
                    <th style="width: 25%;">Description</th>
                    <th style="width: 15%;">Price</th>
                    <th style="width: 20%;">Qty</th>
                    <th style="width: 25%;">Item table</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>C112</td>
                    <td>Mouse</td>
                    <td>19.95$</td>
                    <td>
                        <input type="number" name="qty_C112" min="0" value="0">
                    </td>
                    <td><input type="text" class="output-box" disabled></td>
                </tr>
                <tr>
                    <td>B124</td>
                    <td>Keyboard US</td>
                    <td>29.95$</td>
                    <td>
                        <input type="number" name="qty_B124" min="0" value="0">
                    </td>
                    <td><input type="text" class="output-box" disabled></td>
                </tr>
                <tr>
                    <td>U125</td>
                    <td>USB KingMax</td>
                    <td>39.95$</td>
                    <td>
                        <input type="number" name="qty_U125" min="0" value="0">
                    </td>
                    <td><input type="text" class="output-box" disabled></td>
                </tr>
            </tbody>
        </table>
        <hr class="separator">

        <div class="total-container">
            <label for="totalDisplay">Total:</label>
            <input type="text" id="totalDisplay" class="output-box" disabled>
        </div>

        <div class="button-container">
            <button type="submit" class="btn-sum">Sum</button>
        </div>
    </form>
</body>
</html>
